{% extends 'auth_base.html' %}
{% load static %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="min-h-screen bg-sb-light">
    <!-- Navy header band -->
    <div class="bg-sb-navy h-24 w-full"></div>

    <!-- Logo -->
    <div class="flex justify-center -mt-20 relative z-10">
        <div class="bg-white rounded-full p-3 shadow-xl">
            <img src="{% static 'imgs/logo.png' %}" alt="ScaleBridge" class="h-36 w-36 object-contain rounded-full">
        </div>
    </div>

    <div class="flex justify-center px-4 mt-6">
        <div class="bg-white w-full max-w-md rounded-xl shadow-lg border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-sb-navy text-center mb-2">Forgot Password?</h2>
            <p class="text-gray-500 text-sm text-center mb-8">
                Enter your corporate email address and we'll send you a secure link to reset your password.
            </p>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <input type="email" name="email" required placeholder="Corporate Email Address"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-sb-light text-sm focus:ring-2 focus:ring-sb-teal focus:outline-none transition">
                </div>
                
                <button type="submit" class="w-full bg-sb-navy text-white font-bold py-3 rounded-lg tracking-widest text-sm hover:bg-sb-teal transition duration-200">
                    SEND RESET LINK
                </button>

                <div class="text-center pt-2">
                    <a href="{% url 'accounts:login' %}" class="text-sb-teal text-sm font-medium hover:text-sb-navy">
                        Back to Sign In
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
