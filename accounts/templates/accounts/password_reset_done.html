{% extends 'auth_base.html' %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="min-h-screen bg-sb-light flex items-center justify-center px-4">
    <div class="bg-white w-full max-w-md rounded-xl shadow-lg border border-gray-100 p-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-50 rounded-full mb-6">
            <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-sb-navy mb-4">Check Your Inbox</h2>
        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            We've emailed you instructions for setting your password. You should receive them shortly.
        </p>
        <p class="text-xs text-gray-400">
            Didn't receive an email? Check your spam folder.
        </p>
    </div>
</div>
{% endblock %}
