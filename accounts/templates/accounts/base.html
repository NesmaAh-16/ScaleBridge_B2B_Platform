<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleBridge | {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sb-navy':  'rgb(10, 54, 88)',
                        'sb-green': 'rgb(144, 191, 73)',
                        'sb-teal':  'rgb(38, 102, 117)',
                        'sb-light': 'rgb(248, 250, 252)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-sb-light min-h-screen font-sans antialiased">

    {% if messages %}
    <div class="fixed bottom-6 right-6 z-50 space-y-2 max-w-sm">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-lg shadow-lg text-white text-sm
            {% if message.tags == 'error' %}bg-red-600
            {% elif message.tags == 'success' %}bg-sb-teal
            {% else %}bg-sb-navy{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

</body>
</html>
