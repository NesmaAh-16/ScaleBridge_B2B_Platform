{% extends 'auth_base.html' %}

{% block title %}Success{% endblock %}

{% block content %}
<div class="min-h-screen bg-sb-light flex items-center justify-center px-4">
    <div class="bg-white w-full max-w-md rounded-xl shadow-lg border border-gray-100 p-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-6">
            <svg class="w-8 h-8 text-sb-teal" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-sb-navy mb-4">Password Reset Complete</h2>
        <p class="text-gray-500 text-sm mb-8">
            Your password has been successfully updated. You can now log in with your new credentials.
        </p>
        <a href="{% url 'accounts:login' %}" class="inline-block w-full bg-sb-navy text-white font-bold py-3 rounded-lg tracking-widest text-sm hover:bg-sb-teal transition">
            LOG IN NOW
        </a>
    </div>
</div>
{% endblock %}
