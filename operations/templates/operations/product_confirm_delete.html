{% extends 'base.html' %}
{% block page_title %}Security Protocol{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

    <div class="bg-white rounded-[2rem] lg:rounded-[2.5rem] glass-stroke p-6 sm:p-8 lg:p-12 text-center relative overflow-hidden">

        <!-- Danger Glow -->
        <div class="w-20 h-20 sm:w-24 sm:h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 ring-8 ring-red-50/50">

            <i
                data-lucide="alert-triangle"
                class="w-9 h-9 sm:w-10 sm:h-10 text-red-500"
            ></i>

        </div>

        <h2 class="text-2xl sm:text-3xl font-black text-sb-navy tracking-tight mb-4">
            Authorize Deletion?
        </h2>

        <p class="text-sm sm:text-base text-gray-500 font-medium leading-relaxed max-w-md mx-auto mb-8">
            You are about to remove

            <span class="font-bold text-sb-navy">
                "{{ product.name }}"
            </span>

            from the permanent catalog.

            <br class="hidden sm:block">

            This action cannot be undone.
        </p>

        <form method="POST" class="space-y-4">

            {% csrf_token %}

            <button
                type="submit"
                class="w-full min-h-11 bg-red-500 text-white rounded-2xl py-4 font-black text-sm uppercase tracking-widest hover:bg-red-600 transition-all shadow-lg shadow-red-500/20"
            >
                Confirm Purge
            </button>

            <a
                href="{% url 'operations:product_list' %}"
                class="w-full min-h-11 flex items-center justify-center rounded-2xl border border-gray-200 bg-white text-gray-500 font-bold text-sm hover:border-sb-navy hover:text-sb-navy transition-all"
            >
                Cancel
            </a>

        </form>

    </div>

</div>
{% endblock %}
