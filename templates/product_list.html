{% extends "base.html" %}

{% block title %}Products{% endblock %}
{% block page_title %}Product Marketplace{% endblock %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Products will render here in cards using sb-teal buttons -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h3 class="text-sb-navy font-bold text-lg">Product Name</h3>
        <button class="mt-4 w-full bg-sb-teal text-white py-2 rounded-lg hover:bg-sb-navy transition">
            View Details
        </button>
    </div>
</div>
{% endblock %}
