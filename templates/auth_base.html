{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleBridge | {% block title %}{% endblock %}</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Inter"', "sans-serif"] },
            colors: {
              "sb-navy":    "rgb(10, 54, 88)",
              "sb-green":   "rgb(144, 191, 73)",
              "sb-teal":    "rgb(38, 102, 117)",
              "sb-neutral": "rgb(248, 250, 252)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-sb-neutral font-sans antialiased min-h-screen">
    {% block content %}{% endblock %}
  </body>
</html>
